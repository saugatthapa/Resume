kind = "web"
previewPath = "/"
title = "Resume & Career Tools"
version = "1.0.0"
id = "artifacts/resume-tools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25312

[services.development]
run = "pnpm --filter @workspace/resume-tools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-tools", "run", "build" ]
publicDir = "artifacts/resume-tools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25312"
BASE_PATH = "/"
